name: Build RenPy ARM

on:
  workflow_dispatch:
  push:
    branches: [ furlab-engine ]

jobs:
  build:
    runs-on: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install ccache
        run: sudo apt-get update && sudo apt-get install -y ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-arm-${{ hashFiles('**/*.c', '**/*.h', 'prepare.sh', 'build.sh') }}
          restore-keys: |
            ccache-${{ runner.os }}-arm-

      - name: Cache renpy tmp
        uses: actions/cache@v4
        with:
          path: tmp
          key: renpy-tmp-${{ runner.os }}-arm-${{ hashFiles('prepare.sh', 'build.sh') }}
          restore-keys: |
            renpy-tmp-${{ runner.os }}-arm-

      - name: Enable ccache
        run: |
          mkdir -p .ccache
          echo "max_size = 5.0G" > .ccache/ccache.conf
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
          echo "CC=ccache clang" >> $GITHUB_ENV
          echo "CXX=ccache clang++" >> $GITHUB_ENV
          ccache --zero-stats

      - run: chmod +x prepare.sh build.sh
      - run: ./prepare.sh
      - run: ./build.sh

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Archive
        run: tar -czf renios-prebuilt.tar.gz renpy/renios3/prototype/prebuilt

      - uses: actions/upload-artifact@v4
        with:
          name: renios-prebuilt
          path: renios-prebuilt.tar.gz